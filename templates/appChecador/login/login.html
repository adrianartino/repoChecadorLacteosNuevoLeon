{% load static %}
<!DOCTYPE html>
<html lang="zxx" class="js">

<head>
    <base href="../../../">
    <meta charset="utf-8">
    <meta name="author" content="Softnio">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="A powerful and conceptual apps base dashboard template that especially build for developers and programmers.">
    <!-- Fav Icon  -->
    <link rel="shortcut icon" href="{% static 'images\fondoLogin\logoLacteos.ico' %}">
    <!-- Page Title  -->
    <title>Login | DashLite Admin Template</title>
    <!-- StyleSheets  -->
    <link rel="stylesheet" href="{% static 'assets/css/dashlite.css' %}?ver=2.2.0">
    <link id="skin-default" rel="stylesheet" href="{% static 'assets/css/theme.css' %}?ver=2.2.0">
</head>

<style>
        /* 1. Aplicamos la imagen al body y a la raíz */
        body, .nk-app-root {
            background-image: url("{% static 'images/fondoLogin/fondo.jpg' %}") !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
        }

        /* 2. Forzamos transparencia en TODAS las capas intermedias de la plantilla */
        .nk-main, 
        .nk-wrap, 
        .nk-wrap-nosidebar, 
        .nk-content, 
        .nk-block, 
        .nk-auth-body {
            background: transparent !important;
        }

        /* 3. Aseguramos que solo la CARD del login mantenga su color para que sea legible */
        .card {
            background-color: #ffffff !important;
        }
    </style>

<body class="nk-body npc-general pg-auth">
    <div class="nk-app-root">
        <!-- main @s -->
        <div class="nk-main ">
            <!-- wrap @s -->
            <div class="nk-wrap nk-wrap-nosidebar">
                <!-- content @s -->
                <div class="nk-content ">
                    <div class="nk-block nk-block-middle nk-auth-body  wide-xs">
                        <div class="card card-bordered">
                            <div class="card-inner card-inner-lg">
                                <div class="nk-block-head">
                                    <div class="nk-block-head-content">
                                        <div class="brand-logo pb-4 text-center">
                                            <a href="/login/" class="logo-link">
                                               <img class="logo-dark" src="{% static 'images/fondoLogin/logoLacteos.jpeg' %}" alt="Lácteos Nuevo León" style="width: 60%; max-width: 450px; height: auto; display: block; margin: 0 auto;">
                                            </a>
                                        </div>
                                        <h4 class="nk-block-title">Sistema Checador</h4>
                                        <div class="nk-block-des">
                                            <p>Acceda al control de acceso con su usuario y contraseña.</p>
                                        </div>
                                    </div>
                                </div>
                                <form action="{% url 'login' %}" method="POST">
                                    {% csrf_token %}
                                    <div class="form-group">
                                        <div class="form-label-group">
                                            <label class="form-label" for="default-01">Usuario</label>
                                        </div>
                                        <input type="text" class="form-control form-control-lg" id="default-01" placeholder="Ingrese su nombre de usuario." required maxlength="20" name="username">
                                    </div>
                                    <div class="form-group">
                                        <div class="form-label-group">
                                            <label class="form-label" for="password">Contraseña</label>
                                            
                                        </div>
                                        <div class="form-control-wrap">
                                            <a href="#" class="form-icon form-icon-right passcode-switch" data-target="password">
                                                <em class="passcode-icon icon-show icon ni ni-eye"></em>
                                                <em class="passcode-icon icon-hide icon ni ni-eye-off"></em>
                                            </a>
                                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Ingrese su contraseña." required maxlength="20" name="password">
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <button class="btn btn-lg btn-primary btn-block">Entrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- wrap @e -->
            </div>
            <!-- content @e -->
        </div>
        <!-- main @e -->
    </div>
    <!-- app-root @e -->
    <!-- JavaScript -->
    <script src="{% static 'assets/js/bundle.js' %}?ver=2.2.0"></script>
    <script src="{% static 'assets/js/scripts.js' %}?ver=2.2.0"></script>

    {% if error %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        Swal.fire({
            title: 'Error!',
            text: 'Usuario o contraseña incorrectos. Por favor, inténtelo de nuevo.',
            icon: 'error',
            confirmButtonText: 'Reintentar'
        });
    </script>
    {% endif %}

    

    

</html>
